<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="app">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="menu">
                <a href="../emp_dashboard.html" class="menu-item menu-link">Dashboard</a>
                <a href="profile.html" class="menu-item active menu-link">Profile</a>
                <a href="../Attendance/attendance.html" class="menu-item menu-link">Attendance</a>
                <a href="../Settings/settings.html" class="menu-item menu-link">Settings</a>
                <a href="../My_tasks/my_tasks.html" class="menu-item menu-link">My Tasks<span>0</span></a>
            </div>
        </div>

        <!-- Main content -->
        <div class="main-content">

            <div class="dashboard-header">
                <div>
                    <div class="welcome">My Profile</div>
                    <div class="sub-welcome">Manage your personal information</div>
                </div>
                <button class="logout-btn">Logout</button>
            </div>

            <div class="profile-card">
                <form>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" value="Bittu">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" value="bittu@email.com">
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" value="bittu">
                    </div>

                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" value="Employee" readonly>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="save-btn">Save Changes</button>
                        <button type="button" class="cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
