<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>

    <link rel="stylesheet" href="emp_style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="app">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="menu">
                <a href="emp_dashboard.html" class="menu-item active menu-link">Dashboard</a>
                <a href="Profile/profile.html" class="menu-item menu-link">Profile</a>
                <a href="Attendance/attendance.html" class="menu-item menu-link">Attendance</a>
                <a href="Setting/settings.html" class="menu-item menu-link">Settings</a>

                <div class="menu-item">
                    My Tasks <span>0</span>
                </div>
            </div>
        </div>

        <!-- Main content -->
        <div class="main-content">

            <!-- Header section -->
            <div class="dashboard-header">
                <div>
                    <div class="welcome">Welcome back,</div>
                    <div class="sub-welcome">Here’s what’s happening today</div>
                </div>
                <a id="logoutBtn" class="logout-btn menu-link">Logout</a>
            </div>

            <!-- Summary cards section -->
            <div class="summary-cards">
                <div class="stat-card"><div class="label">Total Tasks</div><div class="value">0</div></div>
                <div class="stat-card"><div class="label">Completed</div><div class="value">0</div></div>
                <div class="stat-card"><div class="label">Pending</div><div class="value">0</div></div>
                <div class="stat-card"><div class="label">Attendance %</div><div class="value">0%</div></div>
            </div>

            <!-- Attendance section -->
            <div class="attendance-overview">
                <div class="attendance-item">
                    <div class="label">Check-in Time</div>
                    <div class="value">--:--</div>
                </div>
                <div class="attendance-item">
                    <div class="label">Check-out Time</div>
                    <div class="value">--:--</div>
                </div>
                <div class="attendance-item">
                    <div class="label">Status</div>
                    <div class="value status not-marked">Not Marked</div>
                </div>
                <div class="attendance-actions">
                    <button class="attendance-btn">Check-In</button>
                </div>
            </div>

            <!-- My Recent Tasks section -->
            <div class="tasks-section">
                <div class="section-title">Recent Tasks</div>
                <div class="task-item task-header">
                    <div class="task-title">Task Title</div>
                    <div class="due-date">Due Date</div>
                    <div class="task-status">Status</div>
                </div>
                <div class="all-items">
                    <div class="task-item">
                        <div class="task-title">Complete Timesheet</div>
                        <div class="due-date">03 Mar 2026</div>
                        <div class="task-status pending">Pending</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let button = document.getElementById("logoutBtn");

        button.addEventListener("click", function(event){
            let isConfirm = confirm("Are you sure want to logout ?");

            if(isConfirm){
                window.location.href = "../index.html";
            }
        })
    </script>
</body>  
</html>
