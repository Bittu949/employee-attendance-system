<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div class="app">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="menu">
                <a href="../emp_dashboard.html" class="menu-item menu-link">Dashboard</a>
                <a href="../Profile/profile.html" class="menu-item menu-link">Profile</a>
                <a href="../Attendance/attendance.html" class="menu-item menu-link">Attendance</a>
                <a href="settings.html" class="menu-item active menu-link">Settings</a>
                <a href="../My_tasks/my_tasks.html" class="menu-item">My Tasks <span>0</span></a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="dashboard-header">
                <div>
                    <div class="welcome">Settings</div>
                    <div class="sub-welcome">Manage your account settings</div>
                </div>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>

            <!-- Change Password Card -->
            <div class="settings-card">
                <div class="section-title">Change Password</div>
                <form>
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" name="currentPassword">
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" name="newPassword">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" name="confirmPassword">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="save-btn">Update Password</button>
                        <button type="button" class="cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let button = document.getElementById("logoutBtn");

        button.addEventListener("click", function(event){
            let isConfirm = confirm("Are you sure want to logout ?");

            if(isConfirm){
                window.location.href = "../../index.html";
            }
        })
    </script>
</body>
</html>
