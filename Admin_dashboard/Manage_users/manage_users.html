<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link rel="stylesheet" href="manage_users.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="manage-users">

        <!-- Header section -->
        <div class="manage-user-header">
            <div class="title-heading">
                <div class="manage-user-title">Manage Users</div>
                <div class="manage-user-subtitle">Create, update, and manage employee accounts</div>
            </div>
            <a class="menu-link add-user-btn" href="Add_user/add_user.html">Add User</a>
        </div>
        
        <!-- Search + Filters section -->
        <div class="user-filters">
            <input type="text" class="search-input" placeholder="Search by name or email">
            <select class="role-filter">
                <option value="">All Roles</option>
                <option value="admin">Admin</option>
                <option value="employee">Employee</option>
            </select>
            <select class="status-filter">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>

         <!-- User list section -->
        <div class="user-list">
            <div class="user-list-titles">
                <div class="label">Name</div>
                <div class="label">Email</div>
                <div class="label">Role</div>
                <div class="label">Status</div>
                <div class="label">Actions</div>
            </div>
            <div class="user-list-items">
                <div class="value">Bittu</div>
                <div class="value">bittu123@gmail.com</div>
                <div class="value">Admin</div>
                <div class="value">Active</div>
                <div class="value actions">
                    <a href="Edit_user\edit_user.html" class="action-btn menu-link">Edit</a>
                    <button class="action-btn">Activate</button>
                    <button class="action-btn">Deactivate</button>
                    <button class="action-btn">Reset Password</button>
                </div>
            </div>
            <div class="user-list-items">
                <div class="value">Rahul Sharma</div>
                <div class="value">rahul@company.com</div>
                <div class="value">Employee</div>
                <div class="value">Active</div>
                <div class="value actions">
                    <a href="Edit_user\edit_user.html" class="action-btn menu-link">Edit</a>
                    <button class="action-btn">Deactivate</button>
                    <button class="action-btn">Reset Password</button>
                </div>
            </div>

            <div class="user-list-items">
                <div class="value">Neha Patil</div>
                <div class="value">neha@company.com</div>
                <div class="value">Employee</div>
                <div class="value">Inactive</div>
                <div class="value actions">
                    <a href="Edit_user\edit_user.html" class="action-btn menu-link">Edit</a>
                    <button class="action-btn">Activate</button>
                    <button class="action-btn">Reset Password</button>
                </div>
            </div>

            <div class="user-list-items">
                <div class="value">Aman Verma</div>
                <div class="value">aman@company.com</div>
                <div class="value">Admin</div>
                <div class="value">Active</div>
                <div class="value actions">
                    <a href="Edit_user\edit_user.html" class="action-btn menu-link">Edit</a>
                    <button class="action-btn">Reset Password</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
