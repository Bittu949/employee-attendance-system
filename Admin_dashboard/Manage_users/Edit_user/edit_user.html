<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link rel="stylesheet" href="edit_user.css">
</head>
<body>
    <div class="edit-user">
        <!-- Header -->
        <div class="page-header">
            <div class="header-title">Edit User</div>
            <div class="header-subtitle">Update employee account details</div>
        </div>
        <!-- Form Card -->
        <div class="form-card">
            <form>
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" name="fullName" value="Bittu">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" value="bittu123@gmail.com">
                </div>
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" name="username" value="Bittu">
                </div>
                <div class="form-group">
                    <label>Role:</label>
                    <select name="role">
                        <option value="admin" selected>Admin</option>
                        <option value="employee">Employee</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status:</label>
                    <select name="status">
                        <option value="active" selected>Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <!-- Buttons -->
                <div class="action-btn">
                    <button type="submit" class="save-btn">Save Changes</button>
                    <button type="button" class="cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
