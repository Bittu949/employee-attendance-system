<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="reset_password.css">
</head>
<body>
    <div class="reset-password-page">
        <!-- Header -->
        <div class="page-header">
            <div class="header-title">Reset Password</div>
            <div class="header-subtitle">
                Set a new password for the user account
            </div>
        </div>
        <!-- Form Card -->
        <div class="form-card">
            <form>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" value="Bittu" readonly>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" value="bittu123@gmail.com" readonly>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="newPassword" placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirmPassword" placeholder="Confirm new password">
                </div>
                <div class="form-actions">
                    <button type="submit" class="save-btn">Reset Password</button>
                    <button type="button" class="cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
