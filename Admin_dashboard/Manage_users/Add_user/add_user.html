<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <link rel="stylesheet" href="add_user.css">
</head>
<body>
    <div class="add-user">
        <div class="page-header">
            <div class="header-title">Add User</div>
            <div class="header-subtitle">Create a new employee or admin account</div>
        </div>
        <div class="form-card">
            <form>
                <div class="form-group">
                    <label for="full-name">Full Name:</label>
                    <input id="full-name" name="fullName" type="text" placeholder="Enter name">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input id="email" name="email" type="email" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label for="user-name">Username:</label>
                    <input id="user-name" name="userName" type="text" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input id="password" name="password" type="password" placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password:</label>
                    <input id="confirm-password" name="confirmPassword" type="password" placeholder="Confirm password">
                </div>
                <div class="form-group">
                    <label for="role">Role:</label>
                    <select id="role" name="role">
                        <option value="">Select role</option>
                        <option value="employee">Employee</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="status">Status:</label>
                    <select id="status" name="status">
                        <option value="">Select status</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="action-btn">
                    <button class="add-user-btn" type="submit">Add User</button>
                    <button class="cancel-btn" type="button">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
