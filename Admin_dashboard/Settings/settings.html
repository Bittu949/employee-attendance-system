<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div class="settings">
        <div class="settings-header">
            <div class="header-title">Settings</div>
            <div class="header-subtitle">Manage your account preferences</div>
        </div>
        <div class="profile-section">
            <div class="header-section">Profile Information</div>
            <div class="profile-information">
                <form>
                    <div class="form-group">
                        <label>Name:</label>
                        <input type="text" name="name" value="Bittu">
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" name="email" value="bittu123@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>Username:</label>
                        <input type="text" name="username" value="Bittu">
                    </div>
                    <div class="form-group">
                        <label>Role:</label>
                        <input type="text" name="role" value="Admin" readonly>
                    </div>
                </form>
            </div>
        </div>
        <div class="password-section">
            <div class="section-title">Change Password</div>
            <form>
                <div class="form-group">
                    <label>Current Password:</label>
                    <input type="password" name="currentPassword">
                </div>
                <div class="form-group">
                    <label>New Password:</label>
                    <input type="password" name="newPassword">
                </div>
                <div class="form-group">
                    <label>Confirm Password:</label>
                    <input type="password" name="confirmPassword">
                </div>
                <div class="btn-section">
                    <button type="submit" class="save-btn">Save Changes</button>
                    <button type="button" class="cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
