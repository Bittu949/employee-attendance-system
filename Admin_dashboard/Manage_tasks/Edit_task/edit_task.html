<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link rel="stylesheet" href="edit_task.css">
</head>
<body>
    <div class="task-page">

        <!-- Page Header -->
        <div class="task-topbar">
            <div class="task-header">
                <div class="task-header-title">Edit Task</div>
                <div class="task-header-subtitle">Update task information</div>
            </div>
        </div>

        <!-- Form Card -->
        <div class="task-list">
            <form>
                <div class="form-group">
                    <label for="task-title">Task Title</label>
                    <input type="text" id="task-title" value="Complete Assignment">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="4">Complete the entire assignment and submit before deadline</textarea>
                </div>
                <div class="form-group">
                    <label for="deadline">Deadline</label>
                    <input type="date" id="deadline" value="2026-07-23">
                </div>
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high" selected>High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="pending" selected>Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="create-task">
                        Update Task
                    </button>
                    <button type="button" class="assign-task">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
