<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Task</title>
    <link rel="stylesheet" href="assign_task.css">
</head>
<body>
    <div class="assign-task">
        <div class="page-header">
            <div class="title">Assign Task</div>
            <div class="subtitle">Assign an existing task to an employee</div>
        </div>
        <div class="form-card">
            <form>
                <div class="form-group">
                    <label for="task">Select Task:</label>
                    <select id="task" name="task">
                        <option value="create-homepage">Create Homepage</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="assigned-to">Assigned To:</label>
                    <select id="assigned-to" name="assignedTo">
                        <option value="bittu">Bittu</option>
                    </select>
                </div>
                <div class="task-preview">
                    <div class="task-preview-title">Task Preview</div>
                    <div class="task-preview-header-section">
                        <div class="task-preview-column-heading">Task Title</div>
                        <div class="task-preview-column-heading">Description</div>
                        <div class="task-preview-column-heading">Deadline</div>
                        <div class="task-preview-column-heading">Priority</div>
                        <div class="task-preview-column-heading">Status</div>
                    </div>
                    <div class="task-preview-item-section">
                        <div class="task-preview-column-item">Complete Assignment</div>
                        <div class="task-preview-column-item">complete the whole assignment</div>
                        <div class="task-preview-column-item">23-07-2026</div>
                        <div class="task-preview-column-item">
                            <div class="priority">Low</div>
                        </div>
                        <div class="task-preview-column-item">Pending</div>
                    </div>
                </div>
                <div class="action-btn">
                    <button type="submit" class="assign-task-btn">Assign Task</button>
                    <button type="button" class="cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
