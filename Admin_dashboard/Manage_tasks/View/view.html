<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View</title>
    <link rel="stylesheet" href="view.css">
</head>
<body>
    <div class="task-details-page">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-title">Task Details</div>
            <div class="page-subtitle">View complete information about this task</div>
        </div>

        <!-- Task Card -->
        <div class="task-card">
            <div class="task-info-grid">
                <div class="info-group">
                    <div class="label">Task Title</div>
                    <div class="value">Complete Assignment</div>
                </div>
                <div class="info-group">
                    <div class="label">Assigned To</div>
                    <div class="value">Bittu</div>
                </div>
                <div class="info-group full-width">
                    <div class="label">Description</div>
                    <div class="value">
                        Complete the entire assignment and submit before deadline.
                    </div>
                </div>
                <div class="info-group">
                    <div class="label">Deadline</div>
                    <div class="value">23-07-2026</div>
                </div>
                <div class="info-group">
                    <div class="label">Priority</div>
                    <div class="value priority high">High</div>
                </div>
                <div class="info-group">
                    <div class="label">Status</div>
                    <div class="value">Pending</div>
                </div>
                <div class="info-group">
                    <div class="label">Created Date</div>
                    <div class="value">10-07-2026</div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="task-actions">
                <a href="../Edit_task/edit_task.html"
                class="action-btn menu-link">
                Edit Task
                </a>
                <a href="../Reassign_task/reassign_task.html"
                class="action-btn menu-link">
                Reassign Task
                </a>
                <a href="../task.html"
                class="action-btn menu-link">
                Back to Tasks
                </a>
            </div>
        </div>
    </div>
</body>
</html>
