<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Task</title>
    <link rel="stylesheet" href="task.css">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
</head>
<body>
    <div class="tasks-page">
        
        <!-- Header section -->
        <div class="task-topbar">
            <div class="task-header">
                <div class="task-header-title">Tasks</div>
                <div class="task-header-subtitle">Create, assign, and monitor tasks</div>
            </div>
            <div class="task-actions">
                <a class="menu-link create-task" href="Create_task/create_task.html">Create Task</a>
                <a class="menu-link assign-task" href="Assign_task/assign_task.html">Assign Task</a>
            </div>
        </div>

        <!-- Search & filter section -->
        <div class="search-filter">
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Search by title / description">
            </div>
            <div class="filter-by-state">
                <select class="filter-select" name="state">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="filter-by-user">
                <select class="filter-select" name="assignedTo">
                    <option value="">All Users</option>
                    <option value="bittu">Bittu</option>
                    <option value="rahul">Rahul</option>
                </select>
            </div>
            <div class="filter-by-deadline">
                <select class="filter-select" name="deadline">
                    <option value="">All</option>
                    <option value="today">Today</option>
                    <option value="this-week">This Week</option>
                    <option value="overdue">Overdue</option>
                </select>
            </div>
        </div>

        <!-- Quick summary section -->
        <div class="quick-summary">
            <div class="quick-summary-item">
                <div class="item-heading">Total Tasks</div>
                <div class="item-value">0</div>
            </div>
            <div class="quick-summary-item">
                <div class="item-heading">Pending</div>
                <div class="item-value">0</div>
            </div>
            <div class="quick-summary-item">
                <div class="item-heading">In Progress</div>
                <div class="item-value">0</div>
            </div>
            <div class="quick-summary-item">
                <div class="item-heading">Completed</div>
                <div class="item-value">0</div>
            </div>
        </div>

        <!-- Task list section -->
        <div class="task-list">
            <div class="task-list-header">
                <div class="task-list-column-heading">Task Title</div>
                <div class="task-list-column-heading">Assigned To</div>
                <div class="task-list-column-heading">Deadline</div>
                <div class="task-list-column-heading">Priority</div>
                <div class="task-list-column-heading">Status</div>
                <div class="task-list-column-heading">Actions</div>                
            </div>
            <div class="task-list-items">
                <div class="task-list-column-item">Complete Assignment</div>
                <div class="task-list-column-item">Bittu</div>
                <div class="task-list-column-item">23-07-2026</div>
                <div class="task-list-column-item">
                    <div class="priority">High</div>
                </div>
                <div class="task-list-column-item">Pending</div>
                <div class="task-list-action-btn">
                    <a href="View\view.html" class="btn-view menu-link">View</a>
                    <button class="btn-edit">Edit</button>
                    <button class="btn-delete">Delete</button>
                    <a href="Reassign_task\reassign_task.html" class="btn-reassign menu-link">Reassign</a>
                </div>                
            </div>
        </div>

        <!-- Footer pagination section -->
         <div class="footer-pagination">
            <div class="pagination-label">
                Showing 1–10 of 45
            </div>
            <div class="pagination-btn">
                <button class="prev-btn">Previous</button>
                <button class="next-btn">Next</button>
            </div>
         </div>
    </div>
</body>
</html>
